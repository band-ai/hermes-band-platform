name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # The gateway probes these provider keys; keep them empty so nothing
      # tries to reach a live LLM during tests.
      OPENAI_API_KEY: ""
      OPENROUTER_API_KEY: ""
      NOUS_API_KEY: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Install host + plugin
        run: |
          # hermes-agent is the HOST (provides gateway/, tools/, ...); band-sdk
          # is the runtime dep. Then install this plugin + dev extras.
          pip install 'hermes-agent>=0,<1' 'band-sdk>=1.0.0,<2.0.0'
          pip install -e ".[dev]"

      - name: Standalone-load guard
        run: python scripts/standalone_import_check.py

      - name: Root manifest sync guard
        # The root plugin.yaml is generated from the packaged manifest (single
        # source of truth). Fail if it drifted — regenerate with
        # `python scripts/sync_root_manifest.py --write`.
        run: python scripts/sync_root_manifest.py --check

      - name: Lint
        run: ruff check hermes_band_platform tests scripts __init__.py

      - name: Tests
        run: python -m pytest tests -q
