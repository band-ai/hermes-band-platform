name: Release

# Mirrors the thenvoi-sdk-python publishing model: release-please drives
# versioning + changelog + GitHub releases from conventional commits, and on a
# created release the package is built with uv and published to PyPI via
# Trusted Publishing (OIDC — no API tokens). See RELEASING.md for the one-time
# setup (GitHub App secrets, the `release` environment, the PyPI trusted
# publisher) and the dev → main promotion flow.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    concurrency: release
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate GitHub App Token
        id: app_token_generator
        uses: ./.github/actions/GithubToken
        with:
          app_id: ${{ secrets.APP_ID }}
          installation_id: ${{ secrets.INSTALLATION_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Release Please
        uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app_token_generator.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

  publish:
    needs: [release]
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build hermes-band-platform package
        run: uv build

      - name: Publish hermes-band-platform to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  summary:
    needs: [release, publish]
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.release.outputs.major }}.${{ needs.release.outputs.minor }}.${{ needs.release.outputs.patch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ needs.release.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
