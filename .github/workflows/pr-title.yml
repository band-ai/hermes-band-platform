name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    # Skip validation for bot PRs (dependabot, release-please, etc.)
    if: "!contains(github.actor, '[bot]')"
    steps:
      - name: Validate Conventional Commits format
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          scopes: |
            adapter
            tools
            hub
            skill
            packaging
            ci
            deps
            docs
          requireScope: false
          subjectPattern: ^.{1,80}$
          subjectPatternError: |
            PR title must be 80 characters or less.

            Expected format: type(scope): description
            Example: feat(tools): add band_archive_room action
