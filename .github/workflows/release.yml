name: Release

# Mirrors the thenvoi-sdk-python publishing model: release-please drives
# versioning + changelog + GitHub releases from conventional commits, and on a
# created release the package is built with uv and published to PyPI via
# Trusted Publishing (OIDC — no API tokens). See RELEASING.md for the one-time
# setup (GitHub App secrets, the `release` environment, the PyPI trusted
# publisher) and the dev → main promotion flow.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    concurrency: release
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate GitHub App Token
        id: app_token_generator
        uses: ./.github/actions/GithubToken
        with:
          app_id: ${{ secrets.APP_ID }}
          installation_id: ${{ secrets.INSTALLATION_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Release Please
        uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app_token_generator.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

      - name: Sync generated root manifest into the release PR
        # release-please bumps only the packaged manifest (single source of
        # truth); the root plugin.yaml is generated from it. When a release PR
        # is open, regenerate the root file on the PR branch so it lands with
        # the version bump and `main` is never stale.
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ steps.app_token_generator.outputs.token }}
        run: |
          set -euo pipefail
          BRANCH='${{ fromJSON(steps.release.outputs.pr).headBranchName }}'
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          python3 scripts/sync_root_manifest.py --write
          if ! git diff --quiet -- plugin.yaml; then
            git config user.name "thenvoi-release-bot"
            git config user.email "release-bot@users.noreply.github.com"
            git add plugin.yaml
            git commit -m "chore: regenerate root plugin.yaml from packaged manifest"
            git -c http.extraheader="AUTHORIZATION: bearer $GH_TOKEN" push origin "HEAD:$BRANCH"
          fi

  publish:
    needs: [release]
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build hermes-band-platform package
        run: uv build

      - name: Publish hermes-band-platform to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  summary:
    needs: [release, publish]
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.release.outputs.major }}.${{ needs.release.outputs.minor }}.${{ needs.release.outputs.patch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ needs.release.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
